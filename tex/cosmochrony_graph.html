<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cosmochrony — Dependency Graph</title>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #21262d;
      --text: #e6edf3; --dim: #6e7681;
      --proved:     #3fb950; --proved-bg:     #0d2e1c;
      --structural: #58a6ff; --structural-bg: #0c1e3a;
      --heuristic:  #e3b341; --heuristic-bg:  #2e1f05;
      --open:       #f85149; --open-bg:       #2e0a0a;
      --accent: #bc8cff;
      --branch1: #a5d6ff; --branch2: #f9a825; --branch3: #80cbc4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Fira Code', monospace;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    header {
      padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex;
      align-items: center; gap: 12px; flex-shrink: 0; background: var(--surface);
    }
    header h1 { font-size: 12px; font-weight: 600; color: var(--accent); letter-spacing: .06em; text-transform: uppercase; }
    .legend { display: flex; gap: 10px; font-size: 10px; margin-left: 12px; }
    .li { display: flex; align-items: center; gap: 4px; }
    .dot { width: 9px; height: 9px; border-radius: 2px; }
    .controls { margin-left: auto; display: flex; gap: 6px; align-items: center; }
    .btn { background: var(--border); color: var(--dim); border: none; padding: 3px 9px;
      font-size: 10px; border-radius: 4px; cursor: pointer; font-family: inherit; }
    .btn:hover { background: #30363d; color: var(--text); }
    .btn.active { background: #1f6feb; color: #fff; }
    .branch-btn { padding: 3px 9px; border-radius: 4px; font-size: 10px; cursor: pointer;
      font-family: inherit; border: none; color: #000; }

    .main { display: flex; flex: 1; overflow: hidden; }
    #cw { flex: 1; overflow: hidden; position: relative; }
    svg { width: 100%; height: 100%; }

    .sidebar { width: 290px; border-left: 1px solid var(--border); background: var(--surface);
      overflow-y: auto; padding: 14px; flex-shrink: 0; font-size: 11px; line-height: 1.6; }
    .sidebar h2 { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--dim); margin-bottom: 10px; }
    .branch-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .branch-tag { font-size: 9px; padding: 1px 6px; border-radius: 10px; font-weight: 600; }
    .def-msg { color: var(--dim); font-size: 11px; }

    #detail h3 { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
    #detail .stag { display: inline-block; font-size: 9px; letter-spacing: .08em;
      text-transform: uppercase; padding: 1px 6px; border-radius: 3px; margin-bottom: 6px; }
    #detail .key { color: var(--dim); font-size: 10px; margin-bottom: 6px; }
    #detail p { color: var(--dim); font-size: 11px; margin-bottom: 8px; }
    .dep-section { margin-top: 6px; }
    .dep-title { font-size: 9px; text-transform: uppercase; letter-spacing: .08em; color: var(--dim); margin-bottom: 3px; }
    .chip { display: inline-block; background: var(--border); color: var(--text); padding: 1px 6px;
      border-radius: 3px; font-size: 9px; margin: 2px 2px 2px 0; cursor: pointer; }
    .chip:hover { background: #30363d; }

    .node { cursor: pointer; }
    .node rect { rx: 4; transition: filter .12s; }
    .node:hover rect { filter: brightness(1.35); }
    .node.hi rect { stroke-width: 2.5 !important; filter: brightness(1.4); }
    .node.dim rect { opacity: .18; }
    .node.dim text { opacity: .18; }
    .node text { font-size: 8.5px; font-weight: 700; pointer-events: none;
      dominant-baseline: middle; text-anchor: middle; fill: #e6edf3; font-family: 'SF Mono', monospace; }
    .edge { fill: none; stroke: #21262d; stroke-width: 1.1; }
    .edge.spine { stroke: #30363d; stroke-width: 1.6; }
    .edge.hi { stroke: var(--accent); stroke-width: 2; }
  </style>
</head>
<body>
<header>
  <h1>Cosmochrony &mdash; Dependency Graph</h1>
  <div class="legend">
    <div class="li"><div class="dot" style="background:var(--proved-bg);border:1.5px solid var(--proved)"></div>
      <span style="color:var(--proved)">proved</span></div>
    <div class="li"><div class="dot" style="background:var(--structural-bg);border:1.5px solid var(--structural)"></div>
      <span style="color:var(--structural)">structural</span></div>
    <div class="li"><div class="dot" style="background:var(--heuristic-bg);border:1.5px solid var(--heuristic)"></div>
      <span style="color:var(--heuristic)">heuristic</span></div>
    <div class="li"><div class="dot" style="background:var(--open-bg);border:1.5px solid var(--open)"></div>
      <span style="color:var(--open)">open</span></div>
  </div>
  <div class="controls">
    <button class="btn" id="btnAll" onclick="filterBy('all')" >All</button>
    <button class="btn" onclick="filterBy('proved')">Proved only</button>
    <button class="btn" onclick="filterBy('I')">Branch I</button>
    <button class="btn" onclick="filterBy('II')">Branch II</button>
    <button class="btn" onclick="filterBy('III')">Branch III</button>
    <button class="btn" onclick="resetView()">↺ Reset</button>
  </div>
</header>
<div class="main">
  <div id="cw"><svg id="svg"></svg></div>
  <div class="sidebar">
    <h2>Paper details</h2>
    <div class="branch-tags">
      <span class="branch-tag" style="background:#1a3a4a;color:var(--branch1)">■ Branch I: Foundations</span>
      <span class="branch-tag" style="background:#3a2a05;color:var(--branch2)">■ Branch II: O-series</span>
      <span class="branch-tag" style="background:#0d2e2a;color:var(--branch3)">■ Branch III: Q + Apps</span>
    </div>
    <div id="def-msg" class="def-msg">Click any node to see details and dependencies.</div>
    <div id="detail" style="display:none"></div>
  </div>
</div>
<script>
  const SC = {
    proved:     {fill:'#0d2e1c', stroke:'#3fb950'},
    structural: {fill:'#0c1e3a', stroke:'#58a6ff'},
    heuristic:  {fill:'#2e1f05', stroke:'#e3b341'},
    open:       {fill:'#2e0a0a', stroke:'#f85149'},
  };
  const BRANCHES = {I:'#1a3a4a', II:'#3a2a05', III:'#0d2e2a'};

  const papers = [
    {id:'WP',     lbl:'WP',       s:'structural', b:'I',   key:'Cosmochrony',
      title:'White Paper',
      desc:'Programme overview; substrate χ; iterated projection U_{t+1}=Π∘σ(U_t); BI constraint; relaxation cascade. Primary narrative reference.'},
    {id:'ENI',    lbl:'ENI',      s:'proved',     b:'I',   key:'Beau2026l',
      title:'Emergence & Non-Injectivity',
      desc:'No-go theorem (Thm 2.1): genuine emergence ⟺ Π non-injective ⟺ S_Π > 0. Foundational justification for Axiom A2.'},
    {id:'Found',  lbl:'Found',    s:'proved',     b:'I',   key:'Beau2026m',
      title:'Foundation (Admissible Non-Injective Transitions)',
      desc:'4 axioms A1–A4. Derives Heis₃(ℤ/qℤ) and Weil representation Vρ as theorems (Thm 5.6). Replaces substrate χ and relaxation by pure axiomatic construction.'},
    {id:'Heis',   lbl:'HeisStr',  s:'proved',     b:'I',   key:'Beau2026HeisenbergStructure',

    {id:'nos',    lbl:'noscale',  s:'proved',     b:'I',   key:'Beau2026j',

    {id:'BI',     lbl:'BornInfeld',s:'proved',    b:'II',  key:'Beau2026c',

    {id:'SpA',    lbl:'SpAdm',    s:'proved',     b:'II',  key:'Beau2026a1',

    {id:'SpCap',  lbl:'SpCap',    s:'open',       b:'II',  key:'Beau2026a2',

    {id:'SpR',    lbl:'SpRel',    s:'proved',     b:'II',  key:'Beau2026a5',

    {id:'O1',     lbl:'O1',       s:'proved',     b:'II',  key:'Beau2026a6',

    {id:'O3',     lbl:'O3',       s:'structural', b:'II',  key:'Beau2026a7',

    {id:'O4',     lbl:'O4',       s:'proved',     b:'II',  key:'Beau2026a8',

    {id:'O5',     lbl:'O5',       s:'proved',     b:'II',  key:'Beau2026a9',

    {id:'O6',     lbl:'O6',       s:'proved',     b:'II',  key:'Beau2026a10',

    {id:'O7',     lbl:'O7',       s:'structural', b:'II',  key:'Beau2026a11',

    {id:'O8',     lbl:'O8',       s:'proved',     b:'II',  key:'Beau2026a12',

      desc:'Key obstruction: exponential shell growth |S_n| ∼ p^n on LPS graphs compresses the pre-saturation window to O(log q) BFS steps. Forces Heisenberg transition.'},

    {id:'O9',     lbl:'O9',       s:'proved',     b:'II',  key:'Beau2026a13',

    {id:'O10',    lbl:'O10',      s:'proved',     b:'II',  key:'Beau2026a14',
      title:'O10 — Large-q Computation',
      desc:'First computation at q=101. Confirms n⁴ growth; identifies TensorSketch representation obstruction at large q.'},
    {id:'O11',    lbl:'O11',      s:'structural', b:'II',  key:'Beau2026a15',
      title:'O11 — Fourier-Character Proxy',
      desc:'Bidimensional Fourier-character proxy for Weil-block decomposition overcomes TensorSketch obstruction.'},
    {id:'O12',    lbl:'O12',      s:'proved',     b:'II',  key:'Beau2026a16',
      title:'O12 — Exact Weil Blocks',
      desc:'Exact Weil-block fingerprints resolve the final obstruction. δ̂_exact ≈ 4.3–4.8 for q ∈ {29,…,211}.'},
    {id:'O13',    lbl:'O13',      s:'proved',     b:'II',  key:'Beau2026a17',

    {id:'O14',    lbl:'O14',      s:'structural', b:'II',  key:'Beau2026a18',

    {id:'O15',    lbl:'O15',      s:'proved',     b:'II',  key:'Beau2026a19',
      title:'O15 — Block-Level No-Go',

    {id:'O16',    lbl:'O16',      s:'structural', b:'II',  key:'Beau2026a20',
      title:'O16 — Pair Observable',
      desc:'Identifies σ_pair(n) = σ_c(n)·σ_{q−c}(n) on conjugate pairs {c, q−c}. Exponent doubling δ_pair = 2δ_c ≈ 7.44 resolves the gap.'},
    {id:'O17',    lbl:'O17',      s:'proved',     b:'II',  key:'Beau2026a21',

    {id:'O18',    lbl:'O18',      s:'proved',     b:'II',  key:'Beau2026a22',
      title:'O18 — BI Parity Involution',
      desc:'Thm 4.1: BI parity is the only global symmetry of S_BI[χ]. Minimal fibre condition: fibre = {χ, −χ}. Cited by Q1, Q2.'},
    {id:'O19',    lbl:'O19',      s:'proved',     b:'II',  key:'Beau2026a23',

    {id:'O20',    lbl:'O20',      s:'structural', b:'II',  key:'Beau2026a24',
      title:'O20 — Persistence Criterion',
      desc:'Dynamical selection criterion for the physical sub-spectrum via projective persistence of admissible modes.'},
    {id:'O21',    lbl:'O21',      s:'structural', b:'II',  key:'Beau2026a25',
      title:'O21 — Shell Saturation',
      desc:'Observable saturation rank n₃^obs via Σ_c(n₃) = 3. Constructs the transfer δ_pair → β*.'},
    {id:'O22',    lbl:'O22',      s:'proved',     b:'II',  key:'Beau2026a26',
      title:'O22 — Projection Locking',
      desc:'Thm 3.2: BI projection locking forces n₃^obs to align with a BFS shell.'},
    {id:'O23',    lbl:'O23',      s:'proved',     b:'II',  key:'Beau2026a27',
      title:'O23 — Quaternionic Minimality',
      desc:'Σ_c(n₃) = 3 follows from quaternionic maximality of the admissible neutral generating set.'},
    {id:'O24',    lbl:'O24',      s:'proved',     b:'II',  key:'Beau2026a28',
      title:'O24 — Observable Rank Rigidity',
      desc:'Verticality Lemma: ker Π is free, Im Π is constrained. Closes the unconditional transfer chain c_χ → δ_pair → β* ≈ 0.126 (Cor. 4.2).'},

    {id:'O25',    lbl:'O25',      s:'heuristic',  b:'II',  key:'Beau2026a29',
      title:'O25 — Numerical Campaign',
      desc:'Systematic δ_pair across all (q−1)/2 conjugate pairs. q=29→8.89±0.54, q=61→9.98±0.26, q=101→9.55±0.16. Runs for {151,211,307,401} in progress.'},

    {id:'O27',    lbl:'O27',      s:'proved',     b:'II',  key:'Beau2026a31',

    {id:'PTO',    lbl:'PTO',      s:'structural', b:'II',  key:'Beau2026pto',
      title:'Projective Temporal Ordering',

    {id:'Q1',     lbl:'Q1',       s:'proved',     b:'III', key:'Beau2026q1',
      title:'Q1 — Phase Coherence from Admissibility',
      desc:'Thm 2.7: admissible transitions preserve BI indiscernibility of conjugate Weil blocks ρ_c and ρ_{q−c}. Derives singlet correlator E(â,b̂)=−â·b̂ and Tsirelson bound. Depends on O18, O22, O23.'},
    {id:'Q2',     lbl:'Q2',       s:'proved',     b:'III', key:'Beau2026q2',
      title:'Q2 — Quantum Structure beyond Spin-½',
      desc:'Spin-3/2 quantum structure on 2I; co-admissibility with spin-½. SU(2) as stable admissibility fixed point. Born rule and Tsirelson bound extend without new postulates.'},

    {id:'Q5b',    lbl:'Q5b',      s:'structural', b:'III', key:'Beau2026q5b',

    {id:'Q6a',    lbl:'Q6a',      s:'structural', b:'III', key:'Beau2026q6a',

    {id:'Q6b',    lbl:'Q6b',      s:'structural', b:'III', key:'Beau2026q6b',

      title:'Spectral2 — Relational Spacetime',

      title:'Gravity — IR Einstein Response',
      desc:'G_μν = 8πG_N T^(Π)_μν derived from δS_Π[g]/δg via heat-kernel and zeta regularisation (proved at leading IR order).'},

  const edges = [
    {f:'WP',  t:'ENI', sp:true}, {f:'ENI', t:'Found', sp:true}, {f:'Found',t:'Heis', sp:true},

    {f:'WP',  t:'BI'},  {f:'BI',  t:'SpA'},    {f:'SpA',  t:'SpCap'}, {f:'SpCap',t:'SpG'},
    {f:'SpG', t:'ThGn'},{f:'SpA', t:'SpR', sp:true},
    {f:'SpR', t:'O1', sp:true}, {f:'O1',t:'O3'}, {f:'O3',t:'O4'}, {f:'O4',t:'O5'},
    {f:'O5',t:'O6'}, {f:'O6',t:'O7'}, {f:'O7',t:'O8', sp:true},
    {f:'O8', t:'O9', sp:true}, {f:'O9',t:'O10'}, {f:'O10',t:'O11'}, {f:'O11',t:'O12',sp:true},
    {f:'O12',t:'O13'}, {f:'O13',t:'O14'}, {f:'O14',t:'O15',sp:true},
    {f:'O15',t:'O16',sp:true}, {f:'O16',t:'O17'}, {f:'O17',t:'O18',sp:true},
    {f:'O18',t:'O19'}, {f:'O19',t:'O20'}, {f:'O20',t:'O21'}, {f:'O21',t:'O22'},
    {f:'O22',t:'O23'}, {f:'O23',t:'O24',sp:true},
    {f:'O24',t:'O25',sp:true}, {f:'O24',t:'O26'}, {f:'O26',t:'O27'}, {f:'O24',t:'PTO'},
    {f:'Found',t:'Q1',sp:true}, {f:'O18',t:'Q1'}, {f:'O22',t:'Q1'}, {f:'O23',t:'Q1'},
    {f:'Q1',t:'Q2'}, {f:'Q2',t:'Q5a'}, {f:'Q5a',t:'Q5b',sp:true}, {f:'Q5b',t:'Q6a'}, {f:'Q6a',t:'Q6b'},
    {f:'WP', t:'Sp2'}, {f:'Sp2',t:'Grav',sp:true}, {f:'Grav',t:'Thm'}, {f:'Thm',t:'Lor'},

    {f:'Found',t:'Schw'}, {f:'BI',t:'Cosm'}, {f:'Found',t:'Supra'},

  // Layout: columns (x) and rows (y). Unit = 85x55
  const L = {};
  const X=85, Y=58;
  // Row 0: Branch I foundations
  L.WP={x:0,y:0}; L.ENI={x:X,y:0}; L.Found={x:2*X,y:0}; L.Heis={x:3*X,y:0}; L.nos={x:4*X,y:0};
  // Row 1: SU(2) precursors
  L.BI={x:0,y:Y}; L.SpA={x:X,y:Y}; L.SpCap={x:2*X,y:Y}; L.SpG={x:3*X,y:Y}; L.ThGn={x:4*X,y:Y};
  L.SpR={x:X,y:2*Y};
  // Rows 3-4: LPS phase
  L.O1={x:0,y:3*Y}; L.O3={x:X,y:3*Y}; L.O4={x:2*X,y:3*Y}; L.O5={x:3*X,y:3*Y};
  L.O6={x:4*X,y:3*Y}; L.O7={x:5*X,y:3*Y}; L.O8={x:6*X,y:3*Y};
  // Row 4: Heisenberg phase
  L.O9={x:0,y:4*Y}; L.O10={x:X,y:4*Y}; L.O11={x:2*X,y:4*Y}; L.O12={x:3*X,y:4*Y};
  L.O13={x:4*X,y:4*Y}; L.O14={x:5*X,y:4*Y}; L.O15={x:6*X,y:4*Y};
  // Row 5: Pair observable
  L.O16={x:0,y:5*Y}; L.O17={x:X,y:5*Y}; L.O18={x:2*X,y:5*Y}; L.O19={x:3*X,y:5*Y};
  L.O20={x:4*X,y:5*Y}; L.O21={x:5*X,y:5*Y}; L.O22={x:6*X,y:5*Y}; L.O23={x:7*X,y:5*Y}; L.O24={x:8*X,y:5*Y};
  // Row 6: Validation
  L.O25={x:5*X,y:6*Y}; L.O26={x:6*X,y:6*Y}; L.O27={x:7*X,y:6*Y}; L.PTO={x:8*X,y:6*Y};
  // Q-series (right column, rows 3-8)
  L.Q1={x:10*X,y:3*Y}; L.Q2={x:10*X,y:4*Y}; L.Q5a={x:10*X,y:5*Y}; L.Q5b={x:10*X,y:6*Y};
  L.Q6a={x:10*X,y:7*Y}; L.Q6b={x:10*X,y:8*Y};
  // Gravity track (left column)
  L.Sp2={x:-X,y:4*Y}; L.Grav={x:-X,y:5*Y}; L.Thm={x:-X,y:6*Y}; L.Lor={x:-X,y:7*Y};
  // Applications (row 8)
  L.TopI={x:0,y:8*Y}; L.SMcm={x:X,y:8*Y}; L.Bell={x:2*X,y:8*Y}; L.Schw={x:3*X,y:8*Y};
  L.Cosm={x:4*X,y:8*Y}; L.Supra={x:5*X,y:8*Y};

  const NW=72, NH=22;
  const depMap={}, rdepMap={};
  papers.forEach(p=>{depMap[p.id]=[];rdepMap[p.id]=[];});
  edges.forEach(e=>{depMap[e.t].push(e.f);rdepMap[e.f].push(e.t);});

  let sel=null, tf={x:40,y:30,s:1}, drag=false, ds=null, ts=null;

  function buildSVG(){
    const svg=document.getElementById('svg'); svg.innerHTML='';
    const ns='http://www.w3.org/2000/svg';
    const defs=document.createElementNS(ns,'defs');
    function mk(id,col){
      const m=document.createElementNS(ns,'marker');
      m.setAttribute('id',id); m.setAttribute('markerWidth','7'); m.setAttribute('markerHeight','7');
      m.setAttribute('refX','6'); m.setAttribute('refY','3'); m.setAttribute('orient','auto');
      const p=document.createElementNS(ns,'path'); p.setAttribute('d','M 0 0 L 7 3 L 0 6 z');
      p.setAttribute('fill',col); m.appendChild(p); defs.appendChild(m);
    }
    mk('arr','#21262d'); mk('arr-sp','#30363d'); mk('arr-hi','#bc8cff');
    svg.appendChild(defs);
    const g=document.createElementNS(ns,'g'); g.id='mg';
    g.setAttribute('transform',`translate(${tf.x},${tf.y}) scale(${tf.s})`);
    svg.appendChild(g);

    // Branch backgrounds
    const bg=document.createElementNS(ns,'g'); bg.id='bgr'; g.appendChild(bg);
    function rect(x,y,w,h,col,label){
      const r=document.createElementNS(ns,'rect');
      r.setAttribute('x',x-6); r.setAttribute('y',y-6); r.setAttribute('width',w+12); r.setAttribute('height',h+12);
      r.setAttribute('rx',8); r.setAttribute('fill',col); r.setAttribute('opacity','0.08');
      bg.appendChild(r);
      const t=document.createElementNS(ns,'text');
      t.setAttribute('x',x-2); t.setAttribute('y',y-10);
      t.setAttribute('font-size','9'); t.setAttribute('font-family','SF Mono, monospace');
      t.setAttribute('font-weight','700'); t.setAttribute('fill',col); t.setAttribute('opacity','0.7');
      t.textContent=label; bg.appendChild(t);
    }
    rect(-X,0, 5*X+NW, Y+NH, '#a5d6ff','Branch I: Axiomatic Foundations');
    rect(-X,Y, 9*X+NW, 5*Y+NH, '#f9a825','Branch II: Spectral Admissibility Sub-Programme (O-series)');
    rect(10*X-6, 3*Y-6, NW+12, 5*Y+NH+12, '#80cbc4','Branch III: Q-series');
    rect(-X-6, 4*Y-6, NW+12, 4*Y+NH+12, '#80cbc4','');

    // Edges
    const eg=document.createElementNS(ns,'g'); eg.id='eg'; g.appendChild(eg);
    edges.forEach(e=>{
      const fl=L[e.f], tl=L[e.t]; if(!fl||!tl) return;
      const x1=fl.x+NW/2, y1=fl.y+NH/2, x2=tl.x+NW/2, y2=tl.y+NH/2;
      const el=document.createElementNS(ns,'path');
      const dx=x2-x1, dy=y2-y1;
      el.setAttribute('d',`M ${x1} ${y1} C ${x1+dx*.25} ${y1+dy*.1}, ${x2-dx*.25} ${y2-dy*.1}, ${x2} ${y2}`);
      el.setAttribute('class', e.sp ? 'edge spine' : 'edge');
      el.setAttribute('marker-end', e.sp ? 'url(#arr-sp)' : 'url(#arr)');
      el.setAttribute('data-f',e.f); el.setAttribute('data-t',e.t);
      eg.appendChild(el);
    });

    // Nodes
    const ng=document.createElementNS(ns,'g'); ng.id='ng'; g.appendChild(ng);
    papers.forEach(p=>{
      const pos=L[p.id]; if(!pos) return;
      const c=SC[p.s]||SC.structural;
      const g2=document.createElementNS(ns,'g');
      g2.setAttribute('class','node'); g2.setAttribute('data-id',p.id);
      g2.setAttribute('transform',`translate(${pos.x},${pos.y})`);
      const r=document.createElementNS(ns,'rect');
      r.setAttribute('width',NW); r.setAttribute('height',NH);
      r.setAttribute('rx',4); r.setAttribute('fill',c.fill);
      r.setAttribute('stroke',c.stroke); r.setAttribute('stroke-width','1.5');
      g2.appendChild(r);
      const t=document.createElementNS(ns,'text');
      t.setAttribute('x',NW/2); t.setAttribute('y',NH/2);
      t.textContent=p.lbl; g2.appendChild(t);
      g2.addEventListener('click',()=>selectNode(p.id));
      ng.appendChild(g2);
    });
  }

  function selectNode(id){
    sel=id;
    const p=papers.find(x=>x.id===id);
    const rel=new Set([id,...depMap[id],...rdepMap[id]]);
    document.querySelectorAll('.node').forEach(n=>{
      const nid=n.getAttribute('data-id');
      n.classList.toggle('hi', nid===id);
      n.classList.toggle('dim', !rel.has(nid));
    });
    document.querySelectorAll('.edge,.edge.spine').forEach(e=>{
      const ef=e.getAttribute('data-f'), et=e.getAttribute('data-t');
      const isRel=(ef===id&&rdepMap[id].includes(et))||(et===id&&depMap[id].includes(ef));
      e.classList.toggle('hi', isRel);
      if(isRel) e.setAttribute('marker-end','url(#arr-hi)');
      else e.setAttribute('marker-end', e.classList.contains('spine') ? 'url(#arr-sp)' : 'url(#arr)');
    });
    const c=SC[p.s]||SC.structural;
    const bcolor={'I':'#a5d6ff','II':'#f9a825','III':'#80cbc4'}[p.b]||'#6e7681';
    const depsHtml=depMap[id].map(d=>{const dp=papers.find(x=>x.id===d);
      return `<span class="chip" onclick="selectNode('${d}')">${dp?dp.lbl:d}</span>`;}).join('');
    const rdepsHtml=rdepMap[id].map(d=>{const dp=papers.find(x=>x.id===d);
      return `<span class="chip" onclick="selectNode('${d}')">${dp?dp.lbl:d}</span>`;}).join('');
    document.getElementById('def-msg').style.display='none';
    const det=document.getElementById('detail'); det.style.display='block';
    det.innerHTML=`
    <h3>${p.title}</h3>
    <span class="stag" style="background:${c.fill};color:${c.stroke};border:1px solid ${c.stroke}">${p.s}</span>
    <span class="branch-tag" style="background:${bcolor}22;color:${bcolor};margin-left:4px">Branch ${p.b||'?'}</span>
    ${p.key?`<div class="key">\\cite{${p.key}}</div>`:'<div class="key" style="color:#f85149">no bib key yet</div>'}
    <p>${p.desc}</p>
    ${depsHtml?`<div class="dep-section"><div class="dep-title">↑ depends on</div>${depsHtml}</div>`:''}
    ${rdepsHtml?`<div class="dep-section"><div class="dep-title">↓ used by</div>${rdepsHtml}</div>`:''}
  `;
  }

  function resetView(){
    sel=null; tf={x:40,y:30,s:1}; applyTf();
    document.querySelectorAll('.node').forEach(n=>{n.classList.remove('hi','dim');});
    document.querySelectorAll('.edge,.edge.spine').forEach(e=>{
      e.classList.remove('hi');
      e.setAttribute('marker-end', e.classList.contains('spine') ? 'url(#arr-sp)' : 'url(#arr)');
    });
    document.getElementById('def-msg').style.display='block';
    document.getElementById('detail').style.display='none';
  }

  function filterBy(mode){
    papers.forEach(p=>{
      const n=document.querySelector(`.node[data-id="${p.id}"]`); if(!n) return;
      let hide=false;
      if(mode==='proved') hide=p.s!=='proved';
      else if(mode==='I') hide=p.b!=='I';
      else if(mode==='II') hide=p.b!=='II';
      else if(mode==='III') hide=p.b!=='III';
      n.classList.toggle('dim', hide);
    });
  }

  function applyTf(){
    const g=document.getElementById('mg');
    if(g) g.setAttribute('transform',`translate(${tf.x},${tf.y}) scale(${tf.s})`);
  }

  const cw=document.getElementById('cw');
  cw.addEventListener('mousedown',e=>{if(e.target.closest('.node')) return;
    drag=true; ds={x:e.clientX,y:e.clientY}; ts={x:tf.x,y:tf.y}; cw.style.cursor='grabbing';});
  document.addEventListener('mousemove',e=>{if(!drag) return;
    tf.x=ts.x+(e.clientX-ds.x); tf.y=ts.y+(e.clientY-ds.y); applyTf();});
  document.addEventListener('mouseup',()=>{drag=false; cw.style.cursor='';});
  cw.addEventListener('wheel',e=>{
    e.preventDefault();
    const f=e.deltaY<0?1.1:0.9;
    const r=cw.getBoundingClientRect();
    const mx=e.clientX-r.left, my=e.clientY-r.top;
    tf.x=mx-(mx-tf.x)*f; tf.y=my-(my-tf.y)*f; tf.s*=f; applyTf();
  },{passive:false});

  buildSVG();
</script>
</body>
</html>
