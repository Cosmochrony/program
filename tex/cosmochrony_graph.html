<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cosmochrony — Dependency Graph</title>
  <style>
    /* ── Colour tokens: dark mode (default) ── */
    :root {
      --bg:         #0d1117;
      --surface:    #161b22;
      --surface2:   #1c2128;
      --border:     #21262d;
      --text:       #e6edf3;
      --text-dim:   #9198a1;
      --text-faint: #4d5566;
      --proved:     #3fb950; --proved-bg:     #0d2e1c;
      --struct:     #58a6ff; --struct-bg:     #0c1e3a;
      --heur:       #e3b341; --heur-bg:       #2a1c04;
      --open:       #f85149; --open-bg:       #2e0a0a;
      --accent:     #bc8cff;
      --edge-base:  #2a3040;
      --edge-spine: #3a4560;
      --node-text:  #e6edf3;
      --chip-bg:    #21262d;
      --chip-text:  #c9d1d9;
      --branch1:    #79c0ff;
      --branch2:    #f0b429;
      --branch3:    #56d364;
      --branch1-bg: #0a1e35;
      --branch2-bg: #2a1c04;
      --branch3-bg: #0a2a15;
      --topic-a: #ff9580; /* mass */
      --topic-b: #72d5f5; /* spacetime */
      --topic-c: #b490f5; /* time */
      --topic-d: #6bdc8f; /* QM */
      --topic-e: #f0cb6a; /* gravity */
      --topic-f: #f086a0; /* SM */
      --topic-g: #85d4a8; /* BI */
      --topic-h: #c0a0ff; /* emergence */
      --shadow:   0 2px 12px rgba(0,0,0,.5);
    }
    /* ── Light mode overrides ── */
    @media (prefers-color-scheme: light) {
      :root {
        --bg:         #f6f8fa;
        --surface:    #ffffff;
        --surface2:   #f0f2f5;
        --border:     #d0d7de;
        --text:       #1f2328;
        --text-dim:   #57606a;
        --text-faint: #adb5bd;
        --proved-bg:  #dafbe1; --proved:     #1a7f37;
        --struct-bg:  #ddf4ff; --struct:     #0969da;
        --heur-bg:    #fff8c5; --heur:       #9a6700;
        --open-bg:    #ffebe9; --open:       #cf222e;
        --accent:     #8250df;
        --edge-base:  #c8d0da;
        --edge-spine: #9eaab8;
        --node-text:  #1f2328;
        --chip-bg:    #eaeef2;
        --chip-text:  #1f2328;
        --branch1:    #0550ae;
        --branch2:    #7d4e00;
        --branch3:    #116329;
        --branch1-bg: #ddf4ff;
        --branch2-bg: #fff8c5;
        --branch3-bg: #dafbe1;
        --shadow:     0 2px 8px rgba(0,0,0,.12);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, 'Segoe UI', sans-serif;
      display: flex; flex-direction: column;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0; background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 14px; display: flex; align-items: center;
      gap: 10px; flex-wrap: wrap;
    }
    header h1 {
      font-size: 12px; font-weight: 700; color: var(--accent);
      letter-spacing: .06em; text-transform: uppercase; white-space: nowrap;
    }
    .legend { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .li {
      display: flex; align-items: center; gap: 3px; font-size: 10px; color: var(--text-dim);
      cursor: pointer; padding: 2px 6px; border-radius: 5px; border: 1px solid transparent;
      transition: background .1s, border-color .1s, color .1s; user-select: none;
    }
    .li:hover { background: var(--surface2); color: var(--text); border-color: var(--border); }
    .li.on { border-color: currentColor; background: color-mix(in srgb, currentColor 10%, transparent); }
    .dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

    /* ── Control groups ── */
    .ctrl-group { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
    .ctrl-sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
    .ctrl-label { font-size: 9px; text-transform: uppercase; letter-spacing: .07em;
      color: var(--text-faint); white-space: nowrap; }
    .spacer { flex: 1; min-width: 8px; }
    .btn {
      background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border);
      padding: 3px 9px; font-size: 10px; border-radius: 5px; cursor: pointer;
      font-family: inherit; white-space: nowrap; transition: background .1s, color .1s;
    }
    .btn:hover { background: var(--border); color: var(--text); }
    .btn.on { border-color: var(--accent); color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
    .topic-btn {
      padding: 2px 8px; border-radius: 10px; font-size: 10px; cursor: pointer;
      font-family: inherit; border: 1.5px solid transparent; transition: all .12s;
      white-space: nowrap;
    }
    .topic-btn:hover { filter: brightness(1.2); }
    .topic-btn.on { filter: brightness(1.15); }

    /* ── Search ── */
    #search-box {
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); border-radius: 5px;
      padding: 3px 8px; font-size: 10px; font-family: inherit;
      width: 130px; outline: none; transition: border-color .15s;
    }
    #search-box:focus { border-color: var(--accent); }
    #search-box::placeholder { color: var(--text-faint); }

    /* ── Main layout ── */
    .main { flex: 1; display: flex; overflow: hidden; min-height: 0; }
    #cw { flex: 1; overflow: hidden; position: relative; background: var(--bg); }
    svg { width: 100%; height: 100%; display: block; }

    /* ── Sidebar ── */
    .sidebar {
      width: 300px; flex-shrink: 0; overflow-y: auto;
      background: var(--surface); border-left: 1px solid var(--border);
      padding: 14px; font-size: 12px; line-height: 1.65; color: var(--text);
    }
    .sidebar h2 {
      font-size: 10px; text-transform: uppercase; letter-spacing: .1em;
      color: var(--text-dim); margin-bottom: 10px;
    }
    .branch-legend { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .bl {
      font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px;
      white-space: nowrap;
    }
    .def-msg { color: var(--text-dim); font-size: 11px; line-height: 1.6; }

    /* Paper detail */
    #detail h3 { font-size: 13px; font-weight: 700; margin-bottom: 5px; color: var(--text); }
    .stag {
      display: inline-block; font-size: 9px; letter-spacing: .08em; text-transform: uppercase;
      padding: 1px 6px; border-radius: 3px; margin-right: 4px; margin-bottom: 8px;
      font-weight: 700;
    }
    .brtag {
      display: inline-block; font-size: 10px; font-weight: 600;
      padding: 1px 8px; border-radius: 10px; margin-bottom: 8px;
    }
    .bib-key {
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--text-dim); font-size: 10px; margin-bottom: 8px;
    }
    .desc-text { color: var(--text-dim); font-size: 11px; margin-bottom: 10px; line-height: 1.6; }
    .tags-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
    .ptag {
      font-size: 9px; padding: 1px 6px; border-radius: 8px;
      font-weight: 600; border: 1px solid;
    }
    .dep-section { margin-top: 8px; }
    .dep-title {
      font-size: 9px; text-transform: uppercase; letter-spacing: .08em;
      color: var(--text-faint); margin-bottom: 4px;
    }
    .chip {
      display: inline-block; background: var(--chip-bg); color: var(--chip-text);
      padding: 2px 7px; border-radius: 4px; font-size: 10px;
      margin: 2px 3px 2px 0; cursor: pointer; border: 1px solid var(--border);
      font-family: 'SF Mono', 'Fira Code', monospace;
      transition: background .1s;
    }
    .chip:hover { background: var(--border); }

    /* ── SVG nodes & edges ── */
    .node { cursor: pointer; }
    .node rect { transition: filter .12s; }
    .node:hover rect { filter: brightness(1.4) !important; }
    .node.hi rect { stroke-width: 2.5 !important; filter: brightness(1.45) !important; }
    .node.dim rect { opacity: .12; }
    .node.dim text { opacity: .12; }
    .node text {
      font-size: 8.5px; font-weight: 700; pointer-events: none;
      dominant-baseline: middle; text-anchor: middle;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .edge { fill: none; stroke: var(--edge-base); stroke-width: 1.1; }
    .edge.spine { stroke: var(--edge-spine); stroke-width: 1.6; }
    .edge.hi { stroke: var(--accent) !important; stroke-width: 2.2 !important; }
    .edge.topic-hi { stroke-width: 1.8 !important; opacity: .9; }

    /* ── Smooth SVG pan/zoom transition ── */
    #mg { transition: transform .45s cubic-bezier(.4,0,.2,1); }

    /* ── Links ── */
    .paper-link {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; color: var(--struct); text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color .1s;
      margin-top: 4px; line-height: 1;
    }
    .paper-link svg { width: 10px; height: 10px; flex-shrink: 0; }
    .paper-link:hover { border-bottom-color: var(--struct); }
    /* ── Tooltip ── */
    #tooltip {
      position: fixed; pointer-events: none; z-index: 100;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 7px; padding: 8px 11px; max-width: 260px;
      box-shadow: var(--shadow); display: none;
    }
    #tooltip .tt-title { font-size: 11px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
    #tooltip .tt-desc  { font-size: 10px; color: var(--text-dim); line-height: 1.5; }
  </style>
</head>
<body>
<header>
  <h1>Cosmochrony &mdash; Paper Graph</h1>

  <div class="legend">
    <div class="li" id="li-proved"   style="color:var(--proved)"   onclick="filterStatus('proved')"    ><div class="dot" style="background:var(--proved-bg);border:1.5px solid var(--proved)"></div>proved</div>
    <div class="li" id="li-struct"   style="color:var(--struct)"   onclick="filterStatus('structural')" ><div class="dot" style="background:var(--struct-bg);border:1.5px solid var(--struct)"></div>structural</div>
    <div class="li" id="li-heur"     style="color:var(--heur)"     onclick="filterStatus('heuristic')"  ><div class="dot" style="background:var(--heur-bg);border:1.5px solid var(--heur)"></div>heuristic</div>
    <div class="li" id="li-open"     style="color:var(--open)"     onclick="filterStatus('open')"       ><div class="dot" style="background:var(--open-bg);border:1.5px solid var(--open)"></div>open</div>
  </div>

  <div class="ctrl-sep"></div>
  <span class="ctrl-label">Branch</span>
  <div class="ctrl-group">
    <button class="btn" onclick="filterBranch('I')">I</button>
    <button class="btn" onclick="filterBranch('II')">II</button>
    <button class="btn" onclick="filterBranch('III')">III</button>
  </div>

  <div class="ctrl-sep"></div>
  <span class="ctrl-label">Topic</span>
  <div class="ctrl-group" id="topic-btns"></div>

  <div class="ctrl-sep"></div>
  <input id="search-box" type="search" placeholder="Search…" oninput="onSearch(this.value)">

  <div class="ctrl-sep"></div>
  <button class="btn" onclick="resetAll()">↺ Reset</button>
</header>

<div id="tooltip"><div class="tt-title"></div><div class="tt-desc"></div></div>
<div class="main">
  <div id="cw"><svg id="svg"></svg></div>
  <div class="sidebar">
    <h2>Navigation</h2>
    <div class="branch-legend">
      <span class="bl" style="background:var(--branch1-bg);color:var(--branch1)">■ I: Foundations</span>
      <span class="bl" style="background:var(--branch2-bg);color:var(--branch2)">■ II: O-series</span>
      <span class="bl" style="background:var(--branch3-bg);color:var(--branch3)">■ III: Q + Apps</span>
    </div>
    <div id="def-msg" class="def-msg">
      Click a node to inspect it.<br>
      Use topic buttons or the search box to highlight thematic clusters.<br>
      Any selection auto-zooms to the highlighted papers.
    </div>
    <div id="detail" style="display:none"></div>
  </div>
</div>

<script>
  /* ════════════════════════════════════════
     DATA
  ════════════════════════════════════════ */

  const TOPICS = [
    {id:'mass',   label:'Mass',      color:'var(--topic-a)'},
    {id:'spt',    label:'Spacetime', color:'var(--topic-b)'},
    {id:'time',   label:'Time',      color:'var(--topic-c)'},
    {id:'QM',     label:'QM',        color:'var(--topic-d)'},
    {id:'grav',   label:'Gravity',   color:'var(--topic-e)'},
    {id:'SM',     label:'SM / Gauge',color:'var(--topic-f)'},
    {id:'BI',     label:'BI / Flux', color:'var(--topic-g)'},
    {id:'emer',   label:'Emergence', color:'var(--topic-h)'},
  ];

  const SC = {
    proved:     {fill:'var(--proved-bg)',  stroke:'var(--proved)'},
    structural: {fill:'var(--struct-bg)',  stroke:'var(--struct)'},
    heuristic:  {fill:'var(--heur-bg)',    stroke:'var(--heur)'},
    open:       {fill:'var(--open-bg)',    stroke:'var(--open)'},
  };
  const BRCOL = {I:'var(--branch1)', II:'var(--branch2)', III:'var(--branch3)'};
  const BRBG  = {I:'var(--branch1-bg)', II:'var(--branch2-bg)', III:'var(--branch3-bg)'};

  const BASE = 'https://cosmochrony.org/science/';
  const ZEN  = 'https://doi.org/10.5281/zenodo.';

  const papers = [
    {id:'WP',     lbl:'WP',       s:'structural', b:'I',   key:'Cosmochrony',
      url: ZEN+'17957509',
      tags:['emer','BI','spt','QM'],
      title:'White Paper (Cosmochrony)',
      desc:'Programme overview; substrate χ; iterated projection U_{t+1}=Π∘σ(U_t); BI constraint; relaxation cascade. Primary narrative reference.'},
    {id:'ENI',    lbl:'ENI',      s:'proved',     b:'I',   key:'Beau2026l',
      url: BASE+'emergence-non-injectivity',
      tags:['emer','time'],
      title:'Emergence & Non-Injectivity',
      desc:'No-go theorem (Thm 2.1): genuine emergence ⟺ Π non-injective ⟺ S_Π > 0. Foundational justification for Axiom A2.'},
    {id:'Found',  lbl:'Found',    s:'proved',     b:'I',   key:'Beau2026m',
      url: ZEN+'19616329',
      tags:['emer','QM','BI','time'],
      title:'Foundation (Admissible Non-Injective Transitions)',
      desc:'4 axioms A1–A4. Derives Heis₃(ℤ/qℤ) and Weil representation Vρ as theorems (Thm 5.6). Replaces substrate χ and relaxation by pure axiomatic construction.'},
    {id:'Heis',   lbl:'HeisStr',  s:'proved',     b:'I',   key:'Beau2026HeisenbergStructure',
      url: ZEN+'19635395',
      tags:['QM','emer'],
      title:'Heisenberg Structure',
      desc:'Detailed proof of Foundation Thm 5.6. Admissible non-factorisability (Axiom A3) forces Heis₃ structure. Uncertainty principle as structural corollary.'},
    {id:'nos',    lbl:'noscale',  s:'proved',     b:'I',   key:'Beau2026j',
      url: ZEN+'19744767',
      tags:['BI'],
      title:'No External Scale',
      desc:'Rigidity: any deformation introducing a dimensional parameter independent of c_χ breaks spectral scaling, non-injectivity, or bounded admissibility closure.'},
    {id:'BI',     lbl:'BornInfeld',s:'proved',    b:'II',  key:'Beau2026c',
      url: BASE+'born-infeld',
      tags:['BI','emer'],
      title:'Born–Infeld Geometry',
      desc:'BI action as unique minimal bounded-flux local representation. Derives the universal bound on admissible relational gradients.'},
    {id:'SpA',    lbl:'SpAdm',    s:'proved',     b:'II',  key:'Beau2026a1',
      url: BASE+'spectral/program/admissibility',
      tags:['QM','BI'],
      title:'Spectral Admissibility (Q₈)',
      desc:'First tractable instance on the quaternion group Q₈. Derives A^max_n = c_χ/√λ_n in the linearised regime.'},
    {id:'SpCap',  lbl:'SpCap',    s:'proved',     b:'II',  key:'Beau2026a2',

      tags:['QM'],
      title:'Spectral Capacity Functional',

    {id:'SpG',    lbl:'SpGram',   s:'proved',     b:'II',  key:'Beau2026a3',
      url: BASE+'spectral/program/rigidity',
      tags:['QM'],
      title:'Gram Rigidity (v1.0.1)',
      desc:'Neutral-generator geometry fully encoded in G_st = −½χ_ρ(st). All information about the SU(2) structure is in pairwise characters.'},
    {id:'ThGn',   lbl:'3Gen',     s:'structural', b:'II',  key:'Beau2026a4',
      url: BASE+'spectral/program/stratigraphy',
      tags:['SM','mass'],
      title:'Three Generations',
      desc:'Three-generation structure from ADE stratigraphic levels of binary Cayley graphs.'},
    {id:'SpR',    lbl:'SpRel',    s:'proved',     b:'II',  key:'Beau2026a5',
      url: BASE+'spectral/program/relaxation',
      tags:['spt'],
      title:'Spectral Relaxation',
      desc:'Λ_proj ≍ λ₂ for LPS expander families. Entry point for the O-series dynamics on LPS graphs.'},
    {id:'O1',     lbl:'O1',       s:'proved',     b:'II',  key:'Beau2026a6',
      url: BASE+'spectral/program/o1',
      tags:['mass'],
      title:'O1 — Variable-Valence Graphs',
      desc:'LPS saturation is a fixed-valence artefact. Growing valence restores the pre-saturation window. (O2 was never written; O3 path was chosen.)'},
    {id:'O3',     lbl:'O3',       s:'structural', b:'II',  key:'Beau2026a7',
      url: BASE+'spectral/program/o3',
      tags:['mass','SM'],
      title:'O3 — Mass Hierarchy',
      desc:'First quantitative SM connection: β* ∈ (0.09, 0.13) from charged-lepton mass ratios m_e:m_μ:m_τ.'},
    {id:'O4',     lbl:'O4',       s:'proved',     b:'II',  key:'Beau2026a8',
      url: BASE+'spectral/program/o4',
      tags:['mass','BI'],
      title:'O4 — Upper Bound β ≤ 1',
      desc:'BI flux + Cheeger isoperimetric inequality ⇒ β ≤ 1.'},
    {id:'O5',     lbl:'O5',       s:'proved',     b:'II',  key:'Beau2026a9',
      url: BASE+'spectral/program/o5',
      tags:['mass'],
      title:'O5 — Rep-Theoretic Obstruction',

    {id:'O6',     lbl:'O6',       s:'proved',     b:'II',  key:'Beau2026a10',

    {id:'O7',     lbl:'O7',       s:'structural', b:'II',  key:'Beau2026a11',

      tags:['mass','QM'],
      title:'O9 — Heisenberg Transition',
      desc:'Key structural shift: Heis₃(ℤ/qℤ) with |B_n| ∼ n⁴ replaces LPS. Θ(q) usable BFS steps.'},
    {id:'O10',    lbl:'O10',      s:'proved',     b:'II',  key:'Beau2026a14',
      url: BASE+'spectral/program/o10',
      tags:['mass'],
      title:'O10 — Large-q Computation',
      desc:'First computation at q=101. Confirms n⁴ growth; identifies TensorSketch representation obstruction.'},
    {id:'O11',    lbl:'O11',      s:'structural', b:'II',  key:'Beau2026a15',
      url: BASE+'spectral/program/o11',
      tags:['mass'],
      title:'O11 — Fourier-Character Proxy',
      desc:'Bidimensional Fourier-character proxy for Weil-block decomposition overcomes TensorSketch obstruction.'},
    {id:'O12',    lbl:'O12',      s:'proved',     b:'II',  key:'Beau2026a16',
      url: BASE+'spectral/program/o12',
      tags:['mass'],
      title:'O12 — Exact Weil Blocks',

    {id:'O13',    lbl:'O13',      s:'proved',     b:'II',  key:'Beau2026a17',
      url: BASE+'spectral/program/o13',
      tags:['mass'],
      title:'O13 — Extended Prime Range',
      desc:'δ̂(q): 4.80 → 3.59 as q grows. Finite-size hypothesis definitively refuted.'},
    {id:'O14',    lbl:'O14',      s:'structural', b:'II',  key:'Beau2026a18',
      url: BASE+'spectral/program/o14',
      tags:['mass'],
      title:'O14 — Observable-Class Correction',

    {id:'O15',    lbl:'O15',      s:'proved',     b:'II',  key:'Beau2026a19',
      url: BASE+'spectral/program/o15',
      tags:['mass'],
      title:'O15 — Block-Level No-Go',

      tags:['mass'],
      title:'O16 — Pair Observable',

    {id:'O17',    lbl:'O17',      s:'proved',     b:'II',  key:'Beau2026a21',
      url: BASE+'spectral/program/o17',
      tags:['mass','QM'],
      title:'O17 — Structural Derivation of Pair',

    {id:'O18',    lbl:'O18',      s:'proved',     b:'II',  key:'Beau2026a22',

  /* ════════════════════════════════════════

  function buildSVG(){
    const svg = document.getElementById('svg');
    svg.innerHTML = '';
    const ns = 'http://www.w3.org/2000/svg';

    /* markers */
    const defs = document.createElementNS(ns,'defs');
    function mk(id, color){
      const m = document.createElementNS(ns,'marker');
      m.setAttribute('id',id); m.setAttribute('markerWidth','7'); m.setAttribute('markerHeight','7');
      m.setAttribute('refX','6'); m.setAttribute('refY','3'); m.setAttribute('orient','auto');
      const p = document.createElementNS(ns,'path');
      p.setAttribute('d','M 0 0 L 7 3 L 0 6 z'); p.setAttribute('fill',color);
      m.appendChild(p); defs.appendChild(m);
    }
    mk('arr',   '#3a4560');
    mk('arr-sp','#4a5580');
    mk('arr-hi','#bc8cff');
    TOPICS.forEach(t=> mk('arr-t-'+t.id, t.color));
    svg.appendChild(defs);

    const g = document.createElementNS(ns,'g'); g.id='mg'; svg.appendChild(g);

    /* branch backgrounds */
    const bgG = document.createElementNS(ns,'g'); g.appendChild(bgG);
    function bgRect(x,y,w,h,varCol,label){
      const rr = document.createElementNS(ns,'rect');
      rr.setAttribute('x',x-6); rr.setAttribute('y',y-6);
      rr.setAttribute('width',w+12); rr.setAttribute('height',h+12);
      rr.setAttribute('rx',8);
      rr.setAttribute('class','br-bg');
      rr.setAttribute('fill',varCol); rr.setAttribute('opacity','0.07');
      bgG.appendChild(rr);
      if(label){
        const t = document.createElementNS(ns,'text');
        t.setAttribute('x',x-2); t.setAttribute('y',y-11);
        t.setAttribute('font-size','9'); t.setAttribute('font-weight','700');
        t.setAttribute('fill',varCol); t.setAttribute('opacity','0.65');
        t.setAttribute('font-family','system-ui,sans-serif');
        t.textContent = label; bgG.appendChild(t);
      }
    }
    bgRect(-X, 0, 5*X+NW, Y+NH, 'var(--branch1)', 'Branch I: Foundations');
    bgRect(-X, Y, 9*X+NW, 5*Y+NH, 'var(--branch2)', 'Branch II: O-series');
    bgRect(10*X-6, 3*Y-6, NW+12, 5*Y+NH+12, 'var(--branch3)', 'Branch III: Q');
    bgRect(-X-6, 4*Y-6, NW+12, 4*Y+NH+12, 'var(--branch3)', '');

    /* edges */
    const eG = document.createElementNS(ns,'g'); eG.id='eg'; g.appendChild(eG);
    edges.forEach(e=>{
      const fl=L[e.f], tl=L[e.t]; if(!fl||!tl) return;
      const x1=fl.x+NW/2, y1=fl.y+NH/2, x2=tl.x+NW/2, y2=tl.y+NH/2;
      const el = document.createElementNS(ns,'path');
      const dx=x2-x1, dy=y2-y1;
      el.setAttribute('d',`M${x1} ${y1} C${x1+dx*.25} ${y1+dy*.1},${x2-dx*.25} ${y2-dy*.1},${x2} ${y2}`);
      el.setAttribute('class', e.sp ? 'edge spine' : 'edge');
      el.setAttribute('marker-end', e.sp ? 'url(#arr-sp)' : 'url(#arr)');
      el.setAttribute('data-f',e.f); el.setAttribute('data-t',e.t);
      eG.appendChild(el);
    });

    /* nodes */
    const nG = document.createElementNS(ns,'g'); nG.id='ng'; g.appendChild(nG);
    papers.forEach(p=>{
      const pos=L[p.id]; if(!pos) return;
      const c = SC[p.s]||SC.structural;
      const g2 = document.createElementNS(ns,'g');
      g2.setAttribute('class','node'); g2.setAttribute('data-id',p.id);
      g2.setAttribute('transform',`translate(${pos.x},${pos.y})`);
      const r = document.createElementNS(ns,'rect');
      r.setAttribute('width',NW); r.setAttribute('height',NH); r.setAttribute('rx',4);
      r.setAttribute('fill', c.fill); r.setAttribute('stroke', c.stroke);
      r.setAttribute('stroke-width','1.5');
      g2.appendChild(r);
      const t = document.createElementNS(ns,'text');
      t.setAttribute('x',NW/2); t.setAttribute('y',NH/2);
      t.setAttribute('fill','var(--node-text)');
      t.textContent = p.lbl; g2.appendChild(t);

      g2.addEventListener('mousemove',  ev=>moveTooltip(ev));

      nG.appendChild(g2);

    /* initial fit */
    requestAnimationFrame(()=> fitAll(false));

      const usedStatuses = new Set(papers.map(p => p.s));
      const statusToLi = {proved:'li-proved', structural:'li-struct', heuristic:'li-heur', open:'li-open'};
      Object.entries(statusToLi).forEach(([status, liId]) => {

    })();

  function applyTf(animate=true){
    const g = document.getElementById('mg'); if(!g) return;
    g.style.transition = animate ? 'transform .45s cubic-bezier(.4,0,.2,1)' : 'none';
    g.setAttribute('transform', `translate(${tf.x},${tf.y}) scale(${tf.s})`);
  }

  function fitNodes(ids, padding=50, animate=true){
    if(!ids.length) return;
    let mnX=Infinity, mnY=Infinity, mxX=-Infinity, mxY=-Infinity;
    ids.forEach(id=>{
      const p=L[id]; if(!p) return;
      mnX=Math.min(mnX,p.x); mnY=Math.min(mnY,p.y);
      mxX=Math.max(mxX,p.x+NW); mxY=Math.max(mxY,p.y+NH);
    });
    if(mnX===Infinity) return;
    const cw=document.getElementById('cw');
    const vw=cw.clientWidth, vh=cw.clientHeight;
    const gw=mxX-mnX+2*padding, gh=mxY-mnY+2*padding;
    const s=Math.min(vw/gw, vh/gh, 2.2);
    const cx=mnX-padding+gw/2, cy=mnY-padding+gh/2;
    tf = {x: vw/2 - cx*s, y: vh/2 - cy*s, s};
    applyTf(animate);
  }

  function fitAll(animate=true){
    fitNodes(papers.map(p=>p.id).filter(id=>L[id]), 50, animate);
  }

  /* ════════════════════════════════════════

  function selectNode(id){
    const p = papers.find(x=>x.id===id);
    const rel = new Set([id,...depMap[id],...rdepMap[id]]);

    document.querySelectorAll('.node').forEach(n=>{
      const nid = n.getAttribute('data-id');
      n.classList.toggle('hi', nid===id);
      n.classList.toggle('dim', !rel.has(nid));
    });
    document.querySelectorAll('.edge').forEach(e=>{
      const ef=e.getAttribute('data-f'), et=e.getAttribute('data-t');
      const isRel = (ef===id&&rdepMap[id].includes(et))||(et===id&&depMap[id].includes(ef));
      e.classList.toggle('hi', isRel);
      if(isRel) e.setAttribute('marker-end','url(#arr-hi)');
      else e.setAttribute('marker-end', e.classList.contains('spine') ? 'url(#arr-sp)' : 'url(#arr)');
    });

    /* auto-zoom to neighbourhood */
    fitNodes([...rel].filter(id=>L[id]));

    /* sidebar */
    const c = SC[p.s]||SC.structural;
    const tagsHtml = (p.tags||[]).map(tid=>{
      const t = TOPICS.find(x=>x.id===tid);
      return t ? `<span class="ptag" style="color:${t.color};border-color:${t.color}60;background:color-mix(in srgb,${t.color} 10%,transparent)">${t.label}</span>` : '';
    }).join('');
    const depsHtml  = depMap[id].map(d=>{const dp=papers.find(x=>x.id===d); return dp?`<span class="chip" onclick="selectNode('${d}')">${dp.lbl}</span>`:''}).join('');
    const rdepsHtml = rdepMap[id].map(d=>{const dp=papers.find(x=>x.id===d); return dp?`<span class="chip" onclick="selectNode('${d}')">${dp.lbl}</span>`:''}).join('');

    document.getElementById('def-msg').style.display = 'none';
    const det = document.getElementById('detail'); det.style.display='block';
    det.innerHTML = `
    <h3>${p.title}</h3>
    <span class="stag" style="background:${c.fill};color:${c.stroke};border:1px solid ${c.stroke}">${p.s}</span>
    <span class="brtag" style="background:${BRBG[p.b]};color:${BRCOL[p.b]}">Branch ${p.b||'?'}</span>
    <div class="bib-key">${p.key||'?'}</div>
    ${p.url ? paperLinkHTML(p.url) : ''}
    <div class="desc-text">${p.desc}</div>
    ${tagsHtml?`<div class="tags-row">${tagsHtml}</div>`:''}
    ${depsHtml?`<div class="dep-section"><div class="dep-title">↑ depends on</div>${depsHtml}</div>`:''}
    ${rdepsHtml?`<div class="dep-section"><div class="dep-title">↓ used by</div>${rdepsHtml}</div>`:''}
  `;
  }

  /* ════════════════════════════════════════
     FILTERS
  ════════════════════════════════════════ */
  function clearAllHighlights(){
    document.querySelectorAll('.node').forEach(n=>n.classList.remove('hi','dim'));
    document.querySelectorAll('.edge').forEach(e=>{
      e.classList.remove('hi','topic-hi');
      e.setAttribute('marker-end', e.classList.contains('spine') ? 'url(#arr-sp)' : 'url(#arr)');
    });
  }

  function applyDim(matchIds){
    const s = new Set(matchIds);
    document.querySelectorAll('.node').forEach(n=>{
      const nid = n.getAttribute('data-id');
      n.classList.toggle('hi', s.has(nid));
      n.classList.toggle('dim', !s.has(nid));
    });
    fitNodes([...s].filter(id=>L[id]));
  }

  function filterBranch(b){
    clearAllHighlights();
    activeTopic = null; activeStatus = null;
    document.querySelectorAll('.topic-btn').forEach(btn=>btn.classList.remove('on'));
    clearLegendOn();
    const matched = papers.filter(p=>p.b===b).map(p=>p.id);
    applyDim(matched);
    hideSidebar();
  }

  const STATUS_LI = {proved:'li-proved', structural:'li-struct', heuristic:'li-heur', open:'li-open'};
  let activeStatus = null;

  function filterStatus(s){
    clearAllHighlights();
    activeTopic = null;
    document.querySelectorAll('.topic-btn').forEach(btn=>btn.classList.remove('on'));
    if(activeStatus === s){ activeStatus=null; clearLegendOn(); fitAll(); hideSidebar(); return; }
    activeStatus = s;
    clearLegendOn();
    const el = document.getElementById(STATUS_LI[s]);
    if(el) el.classList.add('on');
    const matched = papers.filter(p=>p.s===s).map(p=>p.id);
    applyDim(matched);
    hideSidebar();
  }

  function clearLegendOn(){
    Object.values(STATUS_LI).forEach(id=>{ const el=document.getElementById(id); if(el) el.classList.remove('on'); });
  }

  function toggleTopic(tid){
    const btn = document.querySelector(`.topic-btn[data-tid="${tid}"]`);
    if(activeTopic === tid){ resetAll(); return; }
    activeTopic = tid; activeStatus = null;
    document.querySelectorAll('.topic-btn').forEach(b=>b.classList.remove('on'));
    clearLegendOn();
    btn.classList.add('on');
    clearAllHighlights();

    const matched = papers.filter(p=>(p.tags||[]).includes(tid)).map(p=>p.id);
    const mset = new Set(matched);
    document.querySelectorAll('.node').forEach(n=>{
      const nid = n.getAttribute('data-id');
      n.classList.toggle('hi', mset.has(nid));
      n.classList.toggle('dim', !mset.has(nid));
    });
    /* colour edges between matched nodes */
    const t = TOPICS.find(x=>x.id===tid);
    document.querySelectorAll('.edge').forEach(e=>{
      const ef=e.getAttribute('data-f'), et=e.getAttribute('data-t');
      if(mset.has(ef)&&mset.has(et)){
        e.classList.add('topic-hi');
        e.style.stroke = t.color;
        e.setAttribute('marker-end', `url(#arr-t-${tid})`);
      }
    });
    fitNodes(matched.filter(id=>L[id]));
    hideSidebar();
  }

  function onSearch(q){
    activeSearch = q.trim().toLowerCase();
    activeTopic = null;
    document.querySelectorAll('.topic-btn').forEach(b=>b.classList.remove('on'));
    clearAllHighlights();
    if(!activeSearch){ fitAll(); hideSidebar(); return; }
    const matched = papers.filter(p=>
      p.title.toLowerCase().includes(activeSearch) ||
      p.desc.toLowerCase().includes(activeSearch) ||
      p.lbl.toLowerCase().includes(activeSearch) ||
      (p.key||'').toLowerCase().includes(activeSearch) ||
      (p.tags||[]).some(t=>t.toLowerCase().includes(activeSearch))
    ).map(p=>p.id);
    applyDim(matched);
    hideSidebar();
  }

  function resetAll(){
    activeTopic = null; activeStatus = null; activeSearch = '';
    document.getElementById('search-box').value = '';
    document.querySelectorAll('.topic-btn').forEach(b=>b.classList.remove('on'));
    clearLegendOn();
    clearAllHighlights();
    hideSidebar();
    fitAll();
  }

  function hideSidebar(){
    document.getElementById('def-msg').style.display = 'block';
    document.getElementById('detail').style.display = 'none';
  }

  /* ════════════════════════════════════════
  /* ════════════════════════════════════════
     LINK HELPER
  ════════════════════════════════════════ */
  const EXT_ICON = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;

  function paperLinkHTML(url){
    if(!url) return '';
    const label = url.includes('zenodo') ? 'Zenodo ↗' : 'cosmochrony.org ↗';
    return `<a class="paper-link" href="${url}" target="_blank" rel="noopener">${EXT_ICON}${label}</a>`;
  }

  /* ════════════════════════════════════════
     TOOLTIP
  ════════════════════════════════════════ */
  const ttEl    = document.getElementById('tooltip');
  const ttTitle = ttEl.querySelector('.tt-title');
  const ttDesc  = ttEl.querySelector('.tt-desc');
  const TRUNC   = 110;

  function showTooltip(p, ev){
    ttTitle.textContent = p.title;
    const short = p.desc.length > TRUNC ? p.desc.slice(0, TRUNC).replace(/\s\S+$/, '') + '…' : p.desc;
    ttDesc.textContent = short;
    ttEl.style.display = 'block';
    moveTooltip(ev);
  }
  function moveTooltip(ev){
    const pad = 14;
    let x = ev.clientX + pad, y = ev.clientY + pad;
    if(x + 270 > window.innerWidth)  x = ev.clientX - 270 - pad;
    if(y + ttEl.offsetHeight > window.innerHeight) y = ev.clientY - ttEl.offsetHeight - pad;
    ttEl.style.left = x + 'px';
    ttEl.style.top  = y + 'px';
  }
  function hideTooltip(){ ttEl.style.display = 'none'; }

  /* ════════════════════════════════════════
     INIT
  ════════════════════════════════════════ */
  buildSVG();
</script>
</body>
</html>
